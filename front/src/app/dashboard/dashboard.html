<div class="max-w-4xl">

  <!-- Bienvenida -->
  <div class="mb-8">
    <h2 class="text-2xl font-semibold text-slate-800 dark:text-slate-100">
      Bienvenido, {{ usuario?.nombre }}
    </h2>
    <p class="text-sm text-slate-500 dark:text-slate-400 mt-1">
      Rol: <span class="font-medium text-slate-700 dark:text-slate-300">{{ usuario?.rol }}</span>
    </p>
  </div>

  <!-- Cards de módulos -->
  <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
    @for (modulo of modulosVisibles; track modulo.route) {
      <a
        [routerLink]="modulo.route"
        class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-xl p-6 flex flex-col gap-4 hover:shadow-md hover:border-slate-300 dark:hover:border-slate-600 transition-all duration-150 cursor-pointer"
      >
        <div class="w-12 h-12 rounded-lg flex items-center justify-center text-xl" [class]="modulo.color">
          <span [class]="modulo.icon"></span>
        </div>
        <div>
          <h3 class="font-semibold text-slate-800 dark:text-slate-100">{{ modulo.label }}</h3>
          <p class="text-sm text-slate-500 dark:text-slate-400 mt-1">{{ modulo.descripcion }}</p>
        </div>
      </a>
    }
  </div>

  <!-- Placeholder estadísticas -->
  <div class="mt-8 bg-white dark:bg-slate-900 border border-dashed border-slate-300 dark:border-slate-700 rounded-xl p-8 text-center text-slate-400 dark:text-slate-500">
    <span class="pi pi-chart-bar text-3xl mb-3 block"></span>
    <p class="text-sm">Las estadísticas estarán disponibles próximamente</p>
  </div>

</div>
