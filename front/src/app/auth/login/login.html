<div class="min-h-screen flex items-center justify-center bg-gray-50 dark:bg-slate-950">
  <div class="w-full max-w-md bg-white dark:bg-slate-900 rounded-2xl shadow-md p-8">

    <h1 class="text-2xl font-semibold text-gray-800 dark:text-slate-100 mb-6 text-center">Iniciar sesión</h1>

    @if (errorMessage) {
      <p-message severity="error" [text]="errorMessage" styleClass="w-full mb-4" />
    }

    <form [formGroup]="form" (ngSubmit)="onSubmit()" class="flex flex-col gap-4">

      <div class="flex flex-col gap-1">
        <label for="nombre" class="text-sm font-medium text-gray-700 dark:text-slate-300">Usuario</label>
        <input
          pInputText
          id="nombre"
          type="text"
          formControlName="nombre"
          placeholder="Tu nombre de usuario"
          class="w-full"
        />
        @if (form.get('nombre')?.invalid && form.get('nombre')?.touched) {
          <small class="text-red-500">El usuario es requerido</small>
        }
      </div>

      <div class="flex flex-col gap-1">
        <label for="clave" class="text-sm font-medium text-gray-700 dark:text-slate-300">Contraseña</label>
        <p-password
          inputId="clave"
          formControlName="clave"
          placeholder="••••••••"
          [feedback]="false"
          [toggleMask]="true"
          styleClass="w-full"
        />
        @if (form.get('clave')?.invalid && form.get('clave')?.touched) {
          <small class="text-red-500">La contraseña es requerida</small>
        }
      </div>

      <p-button
        type="submit"
        label="Ingresar"
        styleClass="w-full mt-2"
        [loading]="loading"
        [disabled]="form.invalid"
      />

    </form>
  </div>
</div>
